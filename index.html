<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>做什么？</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --text: #e8e4df;
    --text-dim: #8a857f;
    --accent: #e8784a;
    --accent-glow: rgba(232,120,74,0.3);
    --card-radius: 16px;
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ SCROLLING GRID BACKGROUND ============ */
  .bg-grid {
    position: fixed;
    inset: -50%;
    z-index: 0;
    display: flex;
    gap: 14px;
    opacity: 0.35;
    pointer-events: none;
  }
  .bg-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bg-col:nth-child(odd) { animation: scrollDown 80s linear infinite; }
  .bg-col:nth-child(even) { animation: scrollUp 95s linear infinite; }
  .bg-col:nth-child(3) { animation-duration: 70s; }
  .bg-col:nth-child(4) { animation-duration: 110s; }
  .bg-col:nth-child(5) { animation-duration: 85s; }
  .bg-col:nth-child(6) { animation-duration: 100s; }

  @keyframes scrollDown {
    0% { transform: translateY(-50%); }
    100% { transform: translateY(0%); }
  }
  @keyframes scrollUp {
    0% { transform: translateY(0%); }
    100% { transform: translateY(-50%); }
  }

  .bg-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 18px 14px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.04);
    transition: all 0.6s ease;
  }
  .bg-card .mini-emoji { font-size: 1.6rem; display: block; margin-bottom: 6px; }
  .bg-card .mini-text { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.04em; line-height: 1.4; }

  /* ============ OVERLAY ============ */
  .overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(15,15,15,0.4) 0%, rgba(15,15,15,0.92) 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* ============ MAIN BUTTON AREA ============ */
  .hero {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .hero > * { pointer-events: auto; }

  .label-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 2rem;
  }
  .label-line {
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.2);
  }
  .label-text {
    font-size: 0.78rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    font-weight: 300;
  }

  .btn-main {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(26,26,26,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: var(--text);
    font-size: 1.2rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
    box-shadow:
      0 0 0 0 var(--accent-glow),
      0 8px 32px rgba(0,0,0,0.5);
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    animation: breathe 3.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow), 0 8px 32px rgba(0,0,0,0.5); }
    50% { box-shadow: 0 0 0 18px transparent, 0 8px 40px rgba(0,0,0,0.6); }
  }
  .btn-main:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-3px);
    box-shadow:
      0 0 0 12px rgba(232,120,74,0.08),
      0 16px 48px rgba(0,0,0,0.6);
    animation: none;
  }
  .btn-main:active {
    transform: scale(0.93);
    transition: all 0.12s ease;
  }

  .btn-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
    animation: ringSpin 20s linear infinite;
  }
  @keyframes ringSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .hint-row {
    margin-top: 2.4rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hint-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    animation: dotPulse 1.8s ease-in-out infinite;
  }
  .hint-dot:nth-child(2) { animation-delay: 0.2s; }
  .hint-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .hint-text {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-left: 6px;
  }

  /* ============ DETAIL PANEL ============ */
  .detail-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease;
  }
  .detail-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .detail-card {
    background: var(--surface);
    border-radius: 24px;
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    transform: translateY(40px) scale(0.92);
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .detail-overlay.active .detail-card {
    transform: translateY(0) scale(1);
  }

  .detail-img-wrap {
    width: 100%;
    height: 260px;
    position: relative;
    overflow: hidden;
    background: #1a1a1a;
  }
  .detail-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s ease, opacity 0.5s ease;
    opacity: 0;
  }
  .detail-img.loaded {
    opacity: 1;
  }
  .detail-overlay.active .detail-img.loaded {
    transform: scale(1.04);
  }
  .detail-img-gradient {
    position: absolute;
    inset: 0;
    opacity: 0.6;
    transition: opacity 0.5s ease;
  }
  .detail-img.loaded + .detail-img-gradient { opacity: 0.15; }

  .detail-img-badge {
    position: absolute;
    top: 18px;
    left: 18px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    font-size: 0.72rem;
    padding: 6px 14px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  .detail-body {
    padding: 2rem 2rem 2.2rem;
    text-align: center;
  }
  .detail-emoji {
    font-size: 3.2rem;
    display: block;
    margin-top: -3rem;
    margin-bottom: 0.6rem;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  .detail-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 0.5rem;
    color: #fff;
  }
  .detail-desc {
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 0.4rem;
  }
  .detail-tags {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.8rem;
  }
  .detail-tag {
    font-size: 0.7rem;
    padding: 5px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .detail-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-action {
    padding: 12px 28px;
    border-radius: 28px;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: none;
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 6px 24px rgba(232,120,74,0.3);
  }
  .btn-primary:hover {
    background: #e98860;
    transform: translateY(-1px);
    box-shadow: 0 10px 32px rgba(232,120,74,0.4);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.3);
    color: #fff;
  }
  .btn-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    z-index: 5;
  }
  .btn-close:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
  }

  /* ============ FOOTER ============ */
  .site-footer {
    position: fixed;
    bottom: 2rem;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 600px) {
    .bg-grid { gap: 10px; }
    .bg-col { gap: 10px; }
    .bg-card { padding: 12px 8px; border-radius: 10px; }
    .bg-card .mini-emoji { font-size: 1.2rem; }
    .bg-card .mini-text { font-size: 0.62rem; }
    .btn-main { width: 140px; height: 140px; font-size: 1.05rem; }
    .detail-card { max-width: 100%; border-radius: 18px; }
    .detail-img-wrap { height: 200px; }
    .detail-body { padding: 1.5rem 1.2rem 1.8rem; }
    .detail-title { font-size: 1.25rem; }
  }
</style>
</head>

    </div>
  </div>
</div>

// ============ BUILD BACKGROUND GRID ============
(function buildGrid() {
  const grid = document.getElementById('bgGrid');
  const COLUMNS = 6;
  const CARDS_PER_COL = 10;
  const allTasks = [...tasks, ...tasks].sort(() => Math.random() - 0.5); // shuffle

  const cols = Array.from({ length: COLUMNS }, () => []);
  allTasks.forEach((t, i) => cols[i % COLUMNS].push(t));

  cols.forEach((colTasks) => {
    const col = document.createElement('div');
    col.className = 'bg-col';
    // Duplicate for seamless scroll
    const cards = [...colTasks.slice(0, CARDS_PER_COL), ...colTasks.slice(0, CARDS_PER_COL)];
    cards.forEach(t => {
      const card = document.createElement('div');
      card.className = 'bg-card';
      card.innerHTML = `<span class="mini-emoji">${t.emoji}</span><span class="mini-text">${t.text}</span>`;
      col.appendChild(card);
    });
    grid.appendChild(col);
  });
})();

// ============ DETAIL PANEL LOGIC ============
const overlay = document.getElementById('detailOverlay');
const btnMain = document.getElementById('btnMain');
const btnClose = document.getElementById('btnClose');
const btnBack = document.getElementById('btnBack');
const btnReroll = document.getElementById('btnReroll');
const detailImg = document.getElementById('detailImg');
const detailGradient = document.getElementById('detailGradient');
const detailBadge = document.getElementById('detailBadge');
const detailEmoji = document.getElementById('detailEmoji');
const detailTitle = document.getElementById('detailTitle');
const detailDesc = document.getElementById('detailDesc');
const detailTags = document.getElementById('detailTags');

let lastIndex = -1;
let currentTask = null;

function getRandomTask() {
  let idx;
  do {
    idx = Math.floor(Math.random() * tasks.length);
  } while (idx === lastIndex && tasks.length > 1);
  lastIndex = idx;
  return tasks[idx];
}

function showDetail(task) {
  currentTask = task;

  // Set gradient fallback
  detailGradient.style.background = task.gradient;
  detailGradient.style.opacity = '0.6';

  // Set image
  detailImg.classList.remove('loaded');
  detailImg.src = task.image;
  detailImg.onload = () => {
    detailImg.classList.add('loaded');
    detailGradient.style.opacity = '0.15';
  };
  detailImg.onerror = () => {
    // Keep gradient visible if image fails
    detailGradient.style.opacity = '0.6';
  };

  // Set text
  detailBadge.textContent = task.category;
  detailEmoji.textContent = task.emoji;
  detailTitle.textContent = task.text;
  detailDesc.textContent = task.desc;
  detailTags.innerHTML = task.tags.map(t => `<span class="detail-tag">#${t}</span>`).join('');

  // Show
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function hideDetail() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
  detailImg.classList.remove('loaded');
}

function rollNew() {
  // Brief hide animation, then show new
  overlay.classList.remove('active');
  setTimeout(() => {
    const task = getRandomTask();
    showDetail(task);
  }, 350);
}

btnMain.addEventListener('click', () => {
  const task = getRandomTask();
  showDetail(task);
});

btnClose.addEventListener('click', hideDetail);
btnBack.addEventListener('click', hideDetail);
btnReroll.addEventListener('click', rollNew);

// Close on escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && overlay.classList.contains('active')) {
    hideDetail();
  }
});

// Close on clicking backdrop
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) hideDetail();
});

// ============ INITIAL IMAGE PRELOAD ============
// Preload a few images in the background for faster first display
setTimeout(() => {
  tasks.slice(0, 5).forEach(t => {
    const link = document.createElement('link');
    link.rel = 'preload';
    link.as = 'image';
    link.href = t.image;
    document.head.appendChild(link);
  });
}, 2000);
</script>
