<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>做什么？</title>

<!-- Preconnect for faster image loading -->
<link rel="preconnect" href="https://images.unsplash.com" crossorigin />
<link rel="dns-prefetch" href="https://images.unsplash.com" />
<link rel="dns-prefetch" href="https://source.unsplash.com" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --text: #e8e4df;
    --text-dim: #8a857f;
    --accent: #e8784a;
    --accent-glow: rgba(232,120,74,0.3);
  }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 100px;
  }

  /* ============ SCROLLING GRID BACKGROUND ============ */
  .bg-grid {
    position: fixed; inset: -50%; z-index: 0;
    display: flex; gap: 14px; opacity: 0.32; pointer-events: none;
  }
  .bg-col { flex: 1; display: flex; flex-direction: column; gap: 14px; }
  .bg-col:nth-child(odd) { animation: scrollDown 80s linear infinite; }
  .bg-col:nth-child(even) { animation: scrollUp 95s linear infinite; }
  .bg-col:nth-child(3) { animation-duration: 70s; }
  .bg-col:nth-child(4) { animation-duration: 110s; }
  .bg-col:nth-child(5) { animation-duration: 85s; }
  .bg-col:nth-child(6) { animation-duration: 100s; }

  @keyframes scrollDown {
    0% { transform: translateY(-50%); }
    100% { transform: translateY(0%); }
  }
  @keyframes scrollUp {
    0% { transform: translateY(0%); }
    100% { transform: translateY(-50%); }
  }

  .bg-card {
    background: var(--surface); border-radius: 14px; padding: 18px 14px;
    text-align: center; border: 1px solid rgba(255,255,255,0.04);
  }
  .bg-card .mini-emoji { font-size: 1.6rem; display: block; margin-bottom: 6px; }
  .bg-card .mini-text { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.04em; line-height: 1.4; }

  /* ============ OVERLAY ============ */
  .overlay {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse at 50% 30%, rgba(15,15,15,0.4) 0%, rgba(15,15,15,0.92) 100%);
  }

  /* ============ MAIN BUTTON ============ */
  .hero {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .hero > * { pointer-events: auto; }

  .label-row { display: flex; align-items: center; gap: 16px; margin-bottom: 2rem; }
  .label-line { width: 32px; height: 1px; background: rgba(255,255,255,0.2); }
  .label-text { font-size: 0.78rem; letter-spacing: 0.3em; color: var(--text-dim); font-weight: 300; }

  .btn-main {
    width: 170px; height: 170px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(26,26,26,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    color: var(--text); font-size: 1.2rem; font-weight: 500; letter-spacing: 0.08em;
    cursor: pointer; position: relative; user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
    box-shadow: 0 0 0 0 var(--accent-glow), 0 8px 32px rgba(0,0,0,0.5);
    animation: breathe 3.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow), 0 8px 32px rgba(0,0,0,0.5); }
    50% { box-shadow: 0 0 0 18px transparent, 0 8px 40px rgba(0,0,0,0.6); }
  }
  .btn-main:hover {
    border-color: var(--accent); color: var(--accent); transform: translateY(-3px);
    box-shadow: 0 0 0 12px rgba(232,120,74,0.08), 0 16px 48px rgba(0,0,0,0.6);
    animation: none;
  }
  .btn-main:active { transform: scale(0.93); transition: all 0.12s ease; }

  .btn-ring {
    position: absolute; inset: -10px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
    animation: ringSpin 20s linear infinite;
  }
  @keyframes ringSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .hint-row { margin-top: 2.4rem; display: flex; align-items: center; gap: 10px; }
  .hint-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
    animation: dotPulse 1.8s ease-in-out infinite;
  }
  .hint-dot:nth-child(2) { animation-delay: 0.2s; }
  .hint-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .hint-text { font-size: 0.78rem; color: var(--text-dim); letter-spacing: 0.05em; margin-left: 6px; }

  /* ============ HISTORY BAR ============ */
  .history-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: rgba(15,15,15,0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.06); padding: 14px 0 18px;
    transform: translateY(100%); transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .history-bar.visible { transform: translateY(0); }

  .history-inner {
    max-width: 900px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .history-count { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; min-width: 52px; }
  .history-count-num { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
  .history-count-label { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.05em; margin-top: 3px; }
  .history-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.08); flex-shrink: 0; }
  .history-list {
    display: flex; gap: 10px; overflow-x: auto; flex: 1; padding: 4px 0;
    scroll-behavior: smooth;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .history-list::-webkit-scrollbar { display: none; }
  .history-chip {
    flex-shrink: 0; display: flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 22px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer; white-space: nowrap; transition: all 0.25s ease;
    animation: chipIn 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
    font-size: 0.82rem; color: var(--text-dim);
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .history-chip:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); color: #fff; transform: translateY(-2px); }
  .history-chip .chip-emoji { font-size: 1rem; }
  .history-chip .chip-idx { font-size: 0.6rem; color: rgba(255,255,255,0.2); margin-left: 2px; font-weight: 500; }
  @keyframes chipIn {
    0% { opacity: 0; transform: translateX(-12px) scale(0.9); }
    100% { opacity: 1; transform: translateX(0) scale(1); }
  }

  /* ============ DETAIL PANEL ============ */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center; padding: 2rem;
    opacity: 0; pointer-events: none; transition: opacity 0.45s ease;
  }
  .detail-overlay.active { opacity: 1; pointer-events: auto; }

  .detail-card {
    background: var(--surface); border-radius: 24px; width: 100%; max-width: 520px;
    overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    transform: translateY(40px) scale(0.92);
    transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .detail-overlay.active .detail-card { transform: translateY(0) scale(1); }

  /* --- IMAGE AREA --- */
  .detail-img-wrap {
    width: 100%; height: 260px; position: relative; overflow: hidden; background: #1a1a1a;
  }

  /* Layer 1: CSS Art (gradient + emoji + blobs) — instant, always visible */
  .detail-art {
    position: absolute; inset: 0; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.5s ease;
  }
  .detail-art.dimmed { opacity: 0; }

  .detail-art-emoji {
    font-size: 5rem; position: relative; z-index: 3;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    animation: artFloat 3s ease-in-out infinite;
  }
  @keyframes artFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* Decorative blobs in CSS art */
  .detail-art-blob {
    position: absolute; border-radius: 50%; z-index: 1;
    animation: blobDrift 8s ease-in-out infinite;
  }
  @keyframes blobDrift {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(12px, -16px) scale(1.1); }
    66% { transform: translate(-8px, 10px) scale(0.92); }
  }
  .detail-img-gradient {
    position: absolute; inset: 0; z-index: 0;
    transition: opacity 0.5s ease;
  }

  /* Layer 2: Real image — loads async, fades in on top */
  .detail-img {
    position: absolute; inset: 0; z-index: 2;
    width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity 0.6s ease;
    transform: scale(1.02);
  }
  .detail-img.loaded { opacity: 1; transform: scale(1); transition: opacity 0.6s ease, transform 0.8s ease; }

  /* Shimmer while loading */
  .detail-shimmer {
    position: absolute; inset: 0; z-index: 0;
    background: linear-gradient(90deg,
      transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    animation: shimmer 1.8s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* Badge */
  .detail-img-badge {
    position: absolute; top: 18px; left: 18px; z-index: 5;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    color: #fff; font-size: 0.72rem; padding: 6px 14px; border-radius: 20px;
    letter-spacing: 0.06em; font-weight: 400;
  }

  /* --- CARD BODY --- */
  .detail-body { padding: 2rem 2rem 2.2rem; text-align: center; }
  .detail-emoji {
    font-size: 3.2rem; display: block; margin-top: -3rem; margin-bottom: 0.6rem;
    position: relative; z-index: 2;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  .detail-title { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 0.5rem; color: #fff; }
  .detail-desc { font-size: 0.9rem; color: var(--text-dim); line-height: 1.7; margin-bottom: 0.4rem; }
  .detail-tags { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.8rem; }
  .detail-tag { font-size: 0.7rem; padding: 5px 14px; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--text-dim); letter-spacing: 0.04em; }

  .detail-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-action { padding: 12px 28px; border-radius: 28px; font-size: 0.9rem; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; border: none; transition: all 0.3s ease; font-family: inherit; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 6px 24px rgba(232,120,74,0.3); }
  .btn-primary:hover { background: #e98860; transform: translateY(-1px); box-shadow: 0 10px 32px rgba(232,120,74,0.4); }
  .btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,0.12); }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
  .btn-close {
    position: absolute; top: 16px; right: 16px; z-index: 6;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12); color: #fff;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s ease;
  }
  .btn-close:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }

  /* ============ EMPTY STATE ============ */
  .empty-state { text-align: center; color: rgba(255,255,255,0.15); font-size: 0.78rem; letter-spacing: 0.06em; white-space: nowrap; padding: 0 20px; }

  /* ============ SITE FOOTER ============ */
  .site-footer {
    position: fixed; bottom: 2rem; left: 0; right: 0; text-align: center; z-index: 9;
    font-size: 0.7rem; color: rgba(255,255,255,0.18); letter-spacing: 0.08em;
    pointer-events: none; transition: opacity 0.4s ease;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 600px) {
    .bg-grid { gap: 10px; } .bg-col { gap: 10px; }
    .bg-card { padding: 12px 8px; border-radius: 10px; }
    .bg-card .mini-emoji { font-size: 1.2rem; } .bg-card .mini-text { font-size: 0.62rem; }
    .btn-main { width: 140px; height: 140px; font-size: 1.05rem; }
    .detail-card { max-width: 100%; border-radius: 18px; }
    .detail-img-wrap { height: 200px; }
    .detail-art-emoji { font-size: 3.8rem; }
    .detail-body { padding: 1.5rem 1.2rem 1.8rem; }
    .detail-title { font-size: 1.25rem; }
    .history-bar { padding: 10px 0 14px; }
    .history-inner { padding: 0 16px; gap: 10px; }
    .history-chip { padding: 6px 12px; font-size: 0.75rem; }
    .history-count-num { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="bg-grid" id="bgGrid"></div>
<div class="overlay"></div>

<!-- HERO -->
<div class="hero">
  <div class="label-row">
    <span class="label-line"></span>
    <span class="label-text">今 日</span>
    <span class="label-line"></span>
  </div>
  <button class="btn-main" id="btnMain" title="点一下试试">
    <span class="btn-ring"></span>
    做什么？
  </button>
  <div class="hint-row">
    <span class="hint-dot"></span><span class="hint-dot"></span><span class="hint-dot"></span>
    <span class="hint-text">点一下，给生活一点随机</span>
  </div>
</div>
<div class="site-footer" id="siteFooter">今日宜 · 随心而动</div>

<!-- HISTORY BAR -->
<div class="history-bar" id="historyBar">
  <div class="history-inner">
    <div class="history-count">
      <span class="history-count-num" id="historyCount">0</span>
      <span class="history-count-label">已抽</span>
    </div>
    <div class="history-divider"></div>
    <div class="history-list" id="historyList">
      <span class="empty-state" id="historyEmpty">点击按钮，开始你的随机之旅 ✨</span>
    </div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard">
    <div class="detail-img-wrap" id="detailImgWrap">
      <button class="btn-close" id="btnClose" title="返回">✕</button>

      <!-- Layer 0: Gradient background -->
      <div class="detail-img-gradient" id="detailGradient"></div>

      <!-- Layer 0.5: Loading shimmer -->
      <div class="detail-shimmer" id="detailShimmer"></div>

      <!-- Layer 1: CSS Art (always renders instantly) -->
      <div class="detail-art" id="detailArt">
        <span class="detail-art-emoji" id="detailArtEmoji"></span>
        <div class="detail-art-blob" id="detailBlob1"></div>
        <div class="detail-art-blob" id="detailBlob2"></div>
      </div>

      <!-- Layer 2: Real image (loads async, fades in on top) -->
      <img class="detail-img" id="detailImg" alt="" />

      <span class="detail-img-badge" id="detailBadge"></span>
    </div>

    <div class="detail-body">
      <span class="detail-emoji" id="detailEmoji"></span>
      <h2 class="detail-title" id="detailTitle"></h2>
      <p class="detail-desc" id="detailDesc"></p>
      <div class="detail-tags" id="detailTags"></div>
      <div class="detail-actions">
        <button class="btn-action btn-primary" id="btnReroll">🔄 再换一个</button>
        <button class="btn-action btn-ghost" id="btnBack">← 返回</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============ TASK DATA (60 tasks) ============
// Uses direct images.unsplash.com CDN URLs — no redirects, much faster.
// Each task has: emoji, text, category, desc, tags, image (direct CDN), gradient (instant CSS art)

function photo(id) { return `https://images.unsplash.com/photo-${id}?w=800&h=500&fit=crop&q=80&auto=format`; }

const tasks = [
  // —— 美食 (10) ——
  { emoji:'🍜', text:'去吃一份麻辣烫', category:'美食', desc:'街角那家小店，热腾腾的红油汤底，一口下去整个人都暖了。生活偶尔也需要一点辣。', tags:['治愈','一人食','街头'], image:photo('1555126634-323283e090fa'), gradient:'linear-gradient(135deg,#c0392b,#e74c3c,#f39c12)' },
  { emoji:'🍣', text:'去吃一顿日料', category:'美食', desc:'坐在吧台前，看师傅捏寿司，蘸一点酱油一口吃下。每一口都是对味蕾的尊重。', tags:['日料','精致','享受'], image:photo('1553621044-4f6b0f9b9a7d'), gradient:'linear-gradient(135deg,#e65100,#ef6c00,#f57c00)' },
  { emoji:'🍕', text:'吃一顿手工披萨', category:'美食', desc:'薄底、拉丝、现烤。找一家正宗披萨店，趁热咬下去——芝士能拉出半米长的幸福感。', tags:['披萨','满足','聚会'], image:photo('1565299624946-b28f40a0ae38'), gradient:'linear-gradient(135deg,#d84315,#e64a19,#bf360c)' },
  { emoji:'🍲', text:'涮一顿火锅', category:'美食', desc:'约上三两好友围着热气腾腾的锅底，涮毛肚涮牛肉涮笑声。没有一顿火锅解决不了的事。', tags:['火锅','聚会','温暖'], image:photo('1617196034796-73dfa7b2fd56'), gradient:'linear-gradient(135deg,#b71c1c,#d32f2f,#e53935)' },
  { emoji:'🥟', text:'去一家老字号吃饺子', category:'美食', desc:'手工擀皮、现包现煮，蘸上醋和辣椒油，一口一个。老店的味道，吃的是记忆。', tags:['饺子','传统','老店'], image:photo('1496116218417-1a781b1c416c'), gradient:'linear-gradient(135deg,#f9a825,#fbc02d,#fff176)' },
  { emoji:'🍢', text:'去夜市吃烧烤', category:'美食', desc:'晚风、烟火气、滋滋作响的烤串。在夜市人潮里穿行，左手烤面筋右手冰啤酒。', tags:['夜市','烧烤','烟火气'], image:photo('1555939594-58d7cb561ad1'), gradient:'linear-gradient(135deg,#3e2723,#4e342e,#5d4037)' },
  { emoji:'🍜', text:'吃一碗兰州拉面', category:'美食', desc:'看师傅现场拉面，面条在手中飞舞。一碗清汤牛肉面，汤清萝卜白辣油红蒜苗绿。', tags:['拉面','传统','手艺'], image:photo('1569718212165-3a8278d5f624'), gradient:'linear-gradient(135deg,#bf360c,#d84315,#e64a19)' },
  { emoji:'🥞', text:'做一顿Brunch犒劳自己', category:'美食', desc:'睡到自然醒，煎蛋烤面包冲咖啡摆盘拍照。周末的仪式感从早午餐开始。', tags:['早午餐','周末','仪式感'], image:photo('1504674900247-0877df9cc836'), gradient:'linear-gradient(135deg,#fdd835,#ffee58,#fff176)' },
  { emoji:'🍦', text:'吃一个冰淇淋', category:'美食', desc:'选最喜欢的口味慢慢舔。感受冰凉在舌尖化开。不管几岁，吃冰淇淋都是一件快乐的事。', tags:['甜食','快乐','简单'], image:photo('1501443762994-82d6a4d0f2a5'), gradient:'linear-gradient(135deg,#f8bbd0,#f48fb1,#ec407a)' },
  { emoji:'🧋', text:'喝一杯珍珠奶茶', category:'美食', desc:'排队买一杯手摇奶茶，咬到珍珠的Q弹瞬间，碳水带来的快乐简单又直接。', tags:['奶茶','快乐','甜食'], image:photo('1558857563-c0cc2f2a2c2b'), gradient:'linear-gradient(135deg,#795548,#8d6e63,#a1887f)' },

  // —— 出行 (8) ——
  { emoji:'🚶', text:'出门散步二十分钟', category:'出行', desc:'不设目的地，只是走走。看路边的树、巷口的猫、天上的云——你会发现附近还有很多没注意过的角落。', tags:['放松','户外','轻运动'], image:photo('1444491741275-374ac1f9d720'), gradient:'linear-gradient(135deg,#2e7d32,#388e3c,#4caf50)' },

// ============ BUILD BACKGROUND GRID ============
(function buildGrid() {
  const grid = document.getElementById('bgGrid');
  const COLUMNS = 6;
  const shuffled = [...tasks].sort(() => Math.random() - 0.5);
  const cols = Array.from({ length: COLUMNS }, () => []);
  shuffled.forEach((t, i) => cols[i % COLUMNS].push(t));
  cols.forEach(colTasks => {
    const col = document.createElement('div');
    col.className = 'bg-col';
    [...colTasks, ...colTasks].forEach(t => {
      const card = document.createElement('div');
      card.className = 'bg-card';
      card.innerHTML = `<span class="mini-emoji">${t.emoji}</span><span class="mini-text">${t.text}</span>`;
      col.appendChild(card);
    });
    grid.appendChild(col);
  });
})();

// ============ HISTORY ============
const historyBar = document.getElementById('historyBar');
const historyList = document.getElementById('historyList');
const historyCount = document.getElementById('historyCount');
const historyEmpty = document.getElementById('historyEmpty');
const siteFooter = document.getElementById('siteFooter');
let rollHistory = [];

function addToHistory(task) {
  const idx = rollHistory.length + 1;
  rollHistory.push({ task, idx });
  historyBar.classList.add('visible');
  siteFooter.style.opacity = '0';
  if (historyEmpty) historyEmpty.remove();
  historyCount.textContent = idx;
  const chip = document.createElement('span');
  chip.className = 'history-chip';
  chip.innerHTML = `<span class="chip-emoji">${task.emoji}</span>${task.text}<span class="chip-idx">#${idx}</span>`;
  chip.title = '点击重新查看';
  chip.addEventListener('click', () => showDetail(task));
  historyList.appendChild(chip);
  setTimeout(() => historyList.scrollTo({ left: historyList.scrollWidth, behavior: 'smooth' }), 100);
}

// ============ DETAIL PANEL ============
const overlay    = document.getElementById('detailOverlay');
const btnMain    = document.getElementById('btnMain');
const btnClose   = document.getElementById('btnClose');
const btnBack    = document.getElementById('btnBack');
const btnReroll  = document.getElementById('btnReroll');
const detailImg  = document.getElementById('detailImg');
const detailGradient = document.getElementById('detailGradient');
const detailArt  = document.getElementById('detailArt');
const detailArtEmoji = document.getElementById('detailArtEmoji');
const detailBlob1 = document.getElementById('detailBlob1');
const detailBlob2 = document.getElementById('detailBlob2');
const detailShimmer = document.getElementById('detailShimmer');
const detailBadge   = document.getElementById('detailBadge');
const detailEmoji   = document.getElementById('detailEmoji');
const detailTitle   = document.getElementById('detailTitle');
const detailDesc    = document.getElementById('detailDesc');
const detailTags    = document.getElementById('detailTags');

let lastIndex = -1;
let imageTimer = null;

function getRandomTask() {
  let idx;
  do { idx = Math.floor(Math.random() * tasks.length); }
  while (idx === lastIndex && tasks.length > 1);
  lastIndex = idx;
  return tasks[idx];
}

// Extract dominant colors from gradient to style the CSS art blobs
function extractColors(gradientStr) {
  const matches = gradientStr.match(/#[0-9a-fA-F]{6}/g);
  return matches || ['#e8784a', '#e8784a'];
}

function showDetail(task) {
  // Clear any pending image timer
  if (imageTimer) clearTimeout(imageTimer);

  // Reset image layer
  detailImg.classList.remove('loaded');
  detailImg.src = '';

  // 1. INSTANT CSS ART — renders immediately, zero network dependency
  const colors = extractColors(task.gradient);
  detailGradient.style.background = task.gradient;
  detailGradient.style.opacity = '1';

  // Configure decorative blobs
  detailBlob1.style.cssText = `
    width:120px; height:120px; top:10%; left:5%; opacity:0.35;
    background:${colors[0] || colors[1]};
  `;
  detailBlob2.style.cssText = `
    width:90px; height:90px; bottom:15%; right:8%; opacity:0.25;
    background:${colors[2] || colors[1]};
  `;

  // Set emoji
  detailArtEmoji.textContent = task.emoji;
  detailArt.classList.remove('dimmed');
  detailShimmer.style.display = 'block';

  // 2. LOAD REAL IMAGE ASYNC — fades in on success
  const img = new Image();
  img.onload = () => {
    detailImg.src = task.image;
    // Tiny delay to ensure src is set before class
    requestAnimationFrame(() => {
      detailImg.classList.add('loaded');
      detailArt.classList.add('dimmed');
      detailShimmer.style.display = 'none';
      detailGradient.style.opacity = '0.4';
    });
  };
  img.onerror = () => {
    // Image failed — CSS art stays prominent, just hide shimmer
    detailShimmer.style.display = 'none';
  };

  // Start loading with a short delay so the CSS art renders first
  imageTimer = setTimeout(() => { img.src = task.image; }, 80);

  // Text content
  detailBadge.textContent = task.category;
  detailEmoji.textContent = task.emoji;
  detailTitle.textContent = task.text;
  detailDesc.textContent = task.desc;
  detailTags.innerHTML = task.tags.map(t => `<span class="detail-tag">#${t}</span>`).join('');

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function hideDetail() {
  if (imageTimer) clearTimeout(imageTimer);
  overlay.classList.remove('active');
  document.body.style.overflow = '';
  detailImg.classList.remove('loaded');
  detailImg.src = '';
  detailArt.classList.remove('dimmed');
}

function rollNew() {
  overlay.classList.remove('active');
  setTimeout(() => {
    const task = getRandomTask();
    addToHistory(task);
    showDetail(task);
  }, 350);
}

// ============ EVENT BINDINGS ============
btnMain.addEventListener('click', () => {
  const task = getRandomTask();
  addToHistory(task);
  showDetail(task);
});
btnClose.addEventListener('click', hideDetail);
btnBack.addEventListener('click', hideDetail);
btnReroll.addEventListener('click', rollNew);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && overlay.classList.contains('active')) hideDetail();
});
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) hideDetail();
});

// ============ BACKGROUND IMAGE PRELOAD (low priority) ============
// Preload the first 12 images so common rolls hit a warm cache
setTimeout(() => {
  tasks.slice(0, 12).forEach(t => {
    const link = document.createElement('link');
    link.rel = 'preload';
    link.as = 'image';
    link.href = t.image;
    link.fetchpriority = 'low';
    document.head.appendChild(link);
  });
}, 3000);
</script>
</body>
</html>
